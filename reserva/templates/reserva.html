<title>AGENDA PET BANHO - Reserva</title>

{% extends "base.html" %}
{% load bootstrap5 %}

{% block conteudo %}

{% if sucesso %}
<div class="row justify-content-center">
    <p class="alert alert-success col-md-4 border border-black fw-medium">OK!</p>
</div>

{% else %}

<h1 class="display-5 fw-bold text-body-emphasis">Reserva</h1>
<form action="" method="post">
  {% csrf_token %}
  {% bootstrap_form form %}
  <div class="text-end">
    <button class="btn btn-warning border border-black fw-medium" type="submit">CONFIRMAR RESERVA</button>
  </div>
</form>

{% endif %}

{% endblock %}
